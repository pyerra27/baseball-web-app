services:
  - type: web
    name: mlb-app-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        sync: false  # set this in the Render dashboard to your frontend URL

  - type: web
    name: mlb-app-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # set this in the Render dashboard to your backend URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
